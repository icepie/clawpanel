# ClawPanel 持续集成工作流
# 推送到 main 分支时自动构建跨平台安装包并上传到 dev prerelease
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同一分支的新提交会取消正在运行的旧工作流
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 跨平台构建并上传到 dev prerelease ──────────────────────────────────────
  build:
    name: 构建 (${{ matrix.platform.name }})
    # PR 只做检查，不构建发布
    if: github.event_name == 'push'
    runs-on: ${{ matrix.platform.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macOS (Apple Silicon)
            os: macos-latest
            args: --target aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
          - name: macOS (Intel)
            os: macos-latest
            args: --target x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
          - name: Linux (x64)
            os: ubuntu-latest
            args: ""
            rust_target: ""
          - name: Windows (x64)
            os: windows-latest
            args: ""
            rust_target: ""

    steps:
      - name: 签出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 安装前端依赖
        run: npm ci

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.rust_target }}

      - name: Rust 编译缓存
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.platform.name }}

      - name: 安装 Linux 系统依赖
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: 设置 dev 版本号
        shell: bash
        run: |
          BASE_VER=$(node -p "require('./src-tauri/tauri.conf.json').version")
          SHORT_SHA=$(git rev-parse --short HEAD)
          DEV_VER="${BASE_VER}-dev.${SHORT_SHA}"
          echo "DEV_VERSION=${DEV_VER}" >> "$GITHUB_ENV"
          # 临时修改 tauri.conf.json 版本（不提交）
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json','utf8'));
            cfg.version = '${DEV_VER}';
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(cfg, null, 2));
          "

      - name: 构建并上传到 dev prerelease
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: dev
          releaseName: "NiceClaw dev"
          releaseBody: "开发版本，由最新 main 分支自动构建。"
          releaseDraft: false
          prerelease: true
          args: ${{ matrix.platform.args }}

  # ── PR 只做代码检查，不构建发布 ────────────────────────────────────────────
  check:
    name: 检查 (${{ matrix.platform.name }})
    if: github.event_name == 'pull_request'
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macOS (ARM64)
            os: macos-latest
          - name: Linux (x64)
            os: ubuntu-latest
          - name: Windows (x64)
            os: windows-latest

    steps:
      - name: 签出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 安装前端依赖
        run: npm ci

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - name: Rust 编译缓存
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: 安装 Linux 系统依赖
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Rust 格式检查
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: Rust 编译检查
        working-directory: src-tauri
        run: cargo check

      - name: Rust Clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: 前端构建验证
        run: npm run build
